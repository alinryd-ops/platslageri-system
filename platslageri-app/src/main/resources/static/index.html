<!DOCTYPE html>
<html>
<head>
    <title>Plåtslageri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; margin: 0; background: #f5f6fa; }
        header { background: #0f172a; color: white; padding: 15px; text-align: center; }

        .tabs { display: flex; background: white; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; }
        .active { border-bottom: 3px solid #2563eb; font-weight: bold; }

        .content { padding: 15px; }

        input, select {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border-radius: 8px; border: 1px solid #ccc;
        }

        button {
            padding: 12px; border: none; border-radius: 10px;
            background: #2563eb; color: white; width: 100%; margin-bottom: 10px;
        }

        .danger { background: red; }

        .card {
            background: white; padding: 15px;
            border-radius: 15px; margin-bottom: 10px;
        }

        #app { display: none; }
    </style>
</head>
<body>

<header>Plåtslageri</header>

<div id="login" class="content">
    <input id="pinInput" type="password" placeholder="PIN">
    <button onclick="loggaIn()">Logga in</button>
</div>

<div id="app">

    <div class="tabs">
        <div class="tab active" onclick="visaTab('jobb')">Jobb</div>
        <div class="tab" onclick="visaTab('skapa')">Skapa</div>
    </div>

    <div id="jobb" class="content">
        <button onclick="hamtaJobb()">Uppdatera</button>
        <div id="jobbLista"></div>
    </div>

    <div id="skapa" class="content" style="display:none;">
        <input id="kund" placeholder="Kund">
        <input id="beskrivning" placeholder="Beskrivning">
        <input id="littra" placeholder="Littra">

        <select id="kundTyp">
            <option value="PRIVAT">Privat</option>
            <option value="FÖRETAG">Företag</option>
        </select>

        <input id="datum" type="date">
        <input id="anteckning" placeholder="Anteckning">

        <h3>Material</h3>

        <div id="materialSkapaLista"></div>

        <select id="matTyp"></select>
        <input id="matMangd" placeholder="Mängd">
        <input id="matEnhet" placeholder="Enhet">

        <button onclick="laggTillMaterialSkapa()">+ Lägg till material</button>
        <button onclick="skapaJobb()">Spara jobb</button>
    </div>

</div>

<div id="jobbDetalj" style="display:none; padding:20px;">

    <button onclick="stangDetalj()">⬅ Tillbaka</button>

    <h3>Material</h3>
    <div id="detaljMaterial"></div>

    <div id="editMaterial" style="display:none;">
        <select id="editMatTyp"></select>
        <input id="editMatMangd" placeholder="Mängd">
        <input id="editMatEnhet" placeholder="Enhet">
        <button onclick="laggTillMaterialEdit()">+ Lägg till</button>
    </div>

    <p id="kundText"></p>
    <p id="beskrivningText"></p>
    <p id="anteckningText"></p>

    <input id="kundInput" style="display:none;">
    <input id="beskrivningInput" style="display:none;">
    <input id="anteckningInput" style="display:none;">

    <button onclick="kopieraJobb()"> Kopiera</button>
    <button onclick="redigeraJobb()"> Redigera</button>
    <button id="sparaBtn" onclick="sparaJobb()" style="display:none;"> Spara</button>
    <button class="danger" onclick="taBortJobb()"> Ta bort</button>

</div>

<script>
console.log("JS startar");

const API_URL = "https://platslageri-system-1.onrender.com";
let PIN = "";
let currentJobb = null;
let materialTyper = [];
const login = document.getElementById("login");
const app = document.getElementById("app");
const pinInput = document.getElementById("pinInput")

/* LOGIN */
async function loggaIn() {
    PIN = pinInput.value;
    if (!PIN) return alert("Skriv PIN");

    try {
        const res = await fetch(API_URL + "/jobb/material-typer", {
            headers: { "X-PIN": PIN }
        });

        if (res.status === 401 || res.status === 403) {
            return alert("Fel PIN-kod");
        }

        materialTyper = await res.json();
        
        login.style.display = "none";
        app.style.display = "block";
        renderMaterialDropdown();
        hamtaJobb();
    } catch (err) {
        alert("Kunde inte ansluta till servern");
    }
}


/* STARTAR APPEN KORREKT*/
async function startApp() {
    console.log("Startar app med PIN:", PIN);

    await hamtaMaterialTyper();
    renderMaterialDropdown();

    await hamtaJobb();
}

/* HÄMTA MATERIALTYPER */
async function hamtaMaterialTyper() {
    const res = await fetch(API_URL + "/jobb/material-typer", {
        headers: { "X-PIN": PIN }
    });

    materialTyper = await res.json();
}

/* DROPDOWN EDIT */
function renderMaterialDropdown() {
    matTyp.innerHTML = '<option value="">Välj material</option>';

    materialTyper.forEach(t => {
        const opt = document.createElement("option");

        const value = typeof t === "string" ? t : t.name;

        opt.value = value;
        opt.text = value;

        matTyp.appendChild(opt);
    });
}

/* TABS */
function visaTab(tab) {
    jobb.style.display = "none";
    skapa.style.display = "none";

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    if (tab === "jobb") {
        jobb.style.display = "block";
        document.querySelectorAll(".tab")[0].classList.add("active");
    } else {
        skapa.style.display = "block";
        document.querySelectorAll(".tab")[1].classList.add("active");
    }
}

/* SKAPA */
async function skapaJobb() {
    await fetch(API_URL + "/jobb", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-PIN": PIN
        },
        body: JSON.stringify({
            kund: kund.value,
            projektBeskrivning: beskrivning.value,
            littra: littra.value,
            kundTyp: kundTyp.value,
            datum: datum.value,
            anteckning: anteckning.value,
            materialLista: materialSkapa
        })
    });

    alert("Sparat!");
    materialSkapa = [];
    renderMaterialSkapa();
    visaTab('jobb');
    hamtaJobb();
}

/* MATERIAL SKAPA */
let materialSkapa = [];

function laggTillMaterialSkapa() {
    const typ = matTyp.value;
    const mangd = parseFloat(matMangd.value);
    const enhet = matEnhet.value;

    if (!typ) return alert("Välj material");
    if (isNaN(mangd)) return alert("Fyll i mängd");

    materialSkapa.push({
        typ: typ.toUpperCase(), // säkerställer rätt enum
        mangd: mangd,
        enhet: enhet
    });

    renderMaterialSkapa();

    matTyp.value = "";
    matMangd.value = "";
    matEnhet.value = "";
}

function renderMaterialSkapa() {
    materialSkapaLista.innerHTML = "";

    materialSkapa.forEach((m, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `${m.typ} - ${m.mangd} ${m.enhet}`;

        const btn = document.createElement("button");
        btn.innerText = "X";
        btn.onclick = () => taBortMaterialSkapa(i);

        div.appendChild(btn);
        materialSkapaLista.appendChild(div);
    });
}

function taBortMaterialSkapa(i) {
    materialSkapa.splice(i, 1);
    renderMaterialSkapa();
}

/* HÄMTA JOBB */
async function hamtaJobb() {
    const res = await fetch(API_URL + "/jobb", {
        headers: { "X-PIN": PIN }
    });

    const jobbData = await res.json();
    jobbLista.innerHTML = "";

    jobbData.forEach(j => {
        const div = document.createElement("div");
        div.className = "card";
        
        const kundText = document.createElement("b");
        kundText.innerText = j.kund;

        const br = document.createElement("br");

        const descText = document.createTextNode(j.projektBeskrivning);

        div.appendChild(kundText);
        div.appendChild(br);
        div.appendChild(descText);
        div.onclick = () => oppnaDetalj(j);
        jobbLista.appendChild(div);
    });
}

/* DETALJ */
function oppnaDetalj(j) {
    currentJobb = j;

    jobbDetalj.style.display = "block";
    app.style.display = "none";

    kundText.innerText = j.kund;
    beskrivningText.innerText = j.projektBeskrivning;
    anteckningText.innerText = j.anteckning || "";

    kundInput.value = j.kund;
    beskrivningInput.value = j.projektBeskrivning;
    anteckningInput.value = j.anteckning || "";

    renderDetaljMaterial(j.materialLista || []);
}

function stangDetalj() {
    jobbDetalj.style.display = "none";
    app.style.display = "block";
}

/* REDIGERA */
function redigeraJobb() {
    kundInput.style.display = "block";
    beskrivningInput.style.display = "block";
    anteckningInput.style.display = "block";

    kundText.style.display = "none";
    beskrivningText.style.display = "none";
    anteckningText.style.display = "none";

    editMaterial.style.display = "block";
    sparaBtn.style.display = "block";

    renderEditMaterial();
}

/* MATERIAL EDIT */
function renderEditMaterial() {
    detaljMaterial.innerHTML = "";

    currentJobb.materialLista.forEach((m, i) => {

        const div = document.createElement("div");

        const select = document.createElement("select");

        materialTyper.forEach(t => {
            const value = typeof t === "string" ? t : t.name;

            const option = document.createElement("option");
            option.value = value;
            option.text = value;

            if (m.typ === value) option.selected = true;

            select.appendChild(option);
        });

        select.onchange = (e) => updateMaterial(i, "typ", e.target.value);

        const mangdInput = document.createElement("input");
        mangdInput.value = m.mangd;
        mangdInput.onchange = (e) => updateMaterial(i, "mangd", e.target.value);

        const enhetInput = document.createElement("input");
        enhetInput.value = m.enhet;
        enhetInput.onchange = (e) => updateMaterial(i, "enhet", e.target.value);

        const btn = document.createElement("button");
        btn.innerText = "X";
        btn.onclick = () => taBortMaterialEdit(i);

        div.appendChild(select);
        div.appendChild(mangdInput);
        div.appendChild(enhetInput);
        div.appendChild(btn);

        detaljMaterial.appendChild(div);
    });
}

function updateMaterial(i, f, v) {
    currentJobb.materialLista[i][f] = v;
}

function taBortMaterialEdit(i) {
    currentJobb.materialLista.splice(i, 1);
    renderEditMaterial();
}

function laggTillMaterialEdit() {
    currentJobb.materialLista.push({
        typ: editMatTyp.value,
        mangd: parseFloat(editMatMangd.value),
        enhet: editMatEnhet.value
    });

    renderEditMaterial();
}

/* SPARA */
async function sparaJobb() {
    await fetch(API_URL + "/jobb/" + currentJobb.id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-PIN": PIN
        },
        body: JSON.stringify({
            kund: kundInput.value,
            projektBeskrivning: beskrivningInput.value,
            anteckning: anteckningInput.value,
            littra: currentJobb.littra,
            kundTyp: currentJobb.kundTyp,
            timmar: currentJobb.timmar,
            minuter: currentJobb.minuter,
            fakturerad: currentJobb.fakturerad,
            littraMarkning: currentJobb.littraMarkning,
            materialLista: currentJobb.materialLista
        })
    });

    alert("Uppdaterat!");
    stangDetalj();
    hamtaJobb();
}

/* DELETE */
async function taBortJobb() {
    if (!confirm("Ta bort?")) return;

    await fetch(API_URL + "/jobb/" + currentJobb.id, {
        method: "DELETE",
        headers: { "X-PIN": PIN }
    });

    alert("Borttagen");
    stangDetalj();
    hamtaJobb();
}

/* VIEW MATERIAL */
function renderDetaljMaterial(list) {
    detaljMaterial.innerHTML = "";

    list.forEach(m => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = `${m.typ} - ${m.mangd} ${m.enhet}`;
        detaljMaterial.appendChild(div);
    });
}

/* COPY */
function kopieraJobb() {
    navigator.clipboard.writeText(
        currentJobb.kund + "\n" + currentJobb.projektBeskrivning
    );
    alert("Kopierat!");
}
</script>

</body>
</html>
